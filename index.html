<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_Study_History | 한능검 1급 목표 ! 박 장 호</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">JH_Study_History V2</div>
        <div class="stats">
            정답: <span id="score-count">0</span> | 진도: <span id="progress-count">0</span>/60
        </div>
    </nav>

    <section class="dev-profile">
        <div class="profile-container">
            <div class="profile-info">
                <span class="dev-tag">Embedded Systems Developer</span>
                <h2>PARK JANG HO</h2>
                <div class="project-links">
                    <a href="https://hohojang.github.io" target="_blank">Portfolio</a>
                    <a href="https://github.com/hohojang" target="_blank">GitHub</a>
                </div>
            </div>
            <div class="status-box">
                <span class="status-label">한능검 1급 목표</span>
                <span class="status-value">TOP TIER PASS</span>
            </div>
        </div>
    </section>

    <header>
        <h1>한능검 심화 1급 </h1>
        <div class="mode-selector">
            <button onclick="startStudy('전근대사')">전근대사 30</button>
            <button onclick="startStudy('근현대사')">근현대사 30</button>
        </div>
    </header>

    <main>
        <div id="quiz-container">
            <div class="welcome-msg">
                학습할 범위를 선택하여 문제를 풀어보세요! <br>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
