<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JH_Study_History | 한능검 1급 실전</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">JH_Study_History V2</div>
        <div class="stats">
            정답: <span id="score-count">0</span> | 진도: <span id="progress-count">0</span>/60
        </div>
    </nav>

    <header>
        <h1>한능검 심화 1급 격파 작전</h1>
        <div class="mode-selector">
            <button onclick="startStudy('전근대사')">전근대사 30</button>
            <button onclick="startStudy('근현대사')">근현대사 30</button>
        </div>
    </header>

    <main>
        <div id="quiz-container">
            <!-- 자바스크립트가 여기에 문제를 생성합니다 -->
            <div class="welcome-msg">
                위의 버튼을 눌러 작전을 개시하십시오!
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
